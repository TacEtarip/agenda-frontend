<ion-button
  class="user-menu-trigger"
  aria-label="Abrir menú de usuario"
  aria-haspopup="menu"
  [attr.aria-expanded]="isOpen()"
  title="Menú de usuario"
  (click)="open($event)"
>
  <ion-icon slot="icon-only" name="person-circle-outline" aria-hidden="true" />
</ion-button>

<ion-popover
  cssClass="user-menu-popover"
  [isOpen]="isOpen()"
  [event]="menuEvent()"
  [dismissOnSelect]="true"
  (didDismiss)="close()"
>
  <ng-template>
    <div class="user-menu-heading">
      <ion-icon name="person-circle-outline" aria-hidden="true" />
      <span>{{ userLabel() }}</span>
    </div>
    <nav aria-label="Navegación de usuario">
      <ion-list lines="none">
        <ion-item button detail="false" routerLink="/dashboard" (click)="close()">
          <ion-icon slot="start" name="grid-outline" aria-hidden="true" />
          <ion-label>Inicio</ion-label>
        </ion-item>
        <ion-item button detail="false" routerLink="/settings" (click)="close()">
          <ion-icon slot="start" name="settings-outline" aria-hidden="true" />
          <ion-label>Ajustes</ion-label>
        </ion-item>
        <ion-item button detail="false" (click)="openGuide()">
          <ion-icon slot="start" name="help-circle-outline" aria-hidden="true" />
          <ion-label>Ver guía de inicio</ion-label>
        </ion-item>
        <ion-item button detail="false" (click)="logout()">
          <ion-icon slot="start" name="log-out-outline" aria-hidden="true" />
          <ion-label>Cerrar sesión</ion-label>
        </ion-item>
      </ion-list>
    </nav>
  </ng-template>
</ion-popover>
