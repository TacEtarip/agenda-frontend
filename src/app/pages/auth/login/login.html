<!-- Background image sits outside ion-content so absolute positioning works correctly -->
<div aria-hidden="true" class="login-bg">
  <img src="/images/leaves.png" alt="" class="login-bg__img" />
  <div class="login-bg__overlay"></div>
</div>

<ion-content class="login-content" style="--background: transparent;">

  <div class="login-wrapper">

      <!-- Header/Logo Area -->
      <div class="login-header">
        <div class="login-logo">
          <ion-icon name="calendar-outline" class="login-logo__icon"></ion-icon>
        </div>
        <h1 class="login-title">Agenda Pro</h1>
        <p class="login-subtitle">Streamline your scheduling effortlessly.</p>
      </div>

      <!-- Main Card -->
      <ion-card class="login-card">
        <ion-card-content class="login-card__content">

          <!-- Mode Toggle -->
          <div class="mode-toggle">
            <button type="button" class="mode-toggle__btn"
              [class.mode-toggle__btn--active]="isLoginMode()"
              (click)="toggleMode(true)">Sign In</button>
            <button type="button" class="mode-toggle__btn"
              [class.mode-toggle__btn--active]="!isLoginMode()"
              (click)="toggleMode(false)">Register</button>
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
            @if (!isLoginMode()) {
            <div class="form-row">
              <ion-input formControlName="firstName" label="First name" labelPlacement="floating" fill="outline"
                shape="round" class="custom-input"></ion-input>
              <ion-input formControlName="lastName" label="Last name" labelPlacement="floating" fill="outline"
                shape="round" class="custom-input"></ion-input>
            </div>
            }

            <div class="form-field">
              <ion-input formControlName="email" type="email" label="Email address" labelPlacement="floating"
                fill="outline" shape="round" class="custom-input">
                <ion-icon slot="start" name="mail-outline" class="input-icon"></ion-icon>
              </ion-input>
            </div>

            <div class="form-field">
              <ion-input formControlName="password" [type]="showPassword() ? 'text' : 'password'" label="Password"
                labelPlacement="floating" fill="outline" shape="round" class="custom-input">
                <ion-icon slot="start" name="lock-closed-outline" class="input-icon"></ion-icon>
                <ion-icon slot="end" [name]="showPassword() ? 'eye-off-outline' : 'eye-outline'"
                  class="toggle-pw-btn"
                  role="button" tabindex="0" aria-label="Toggle password visibility"
                  (click)="showPassword.update(v => !v)" (keydown.enter)="showPassword.update(v => !v)"
                  (keydown.space)="showPassword.update(v => !v)"></ion-icon>
              </ion-input>

              @if (isLoginMode()) {
              <div class="forgot-password">
                <a href="#" class="forgot-password__link">Forgot password?</a>
              </div>
              }
            </div>

            <ion-button expand="block" type="submit" [disabled]="isLoading() || form.invalid"
              class="login-submit-btn" shape="round"
              color="secondary">
              @if (isLoading()) {
              <ion-spinner name="crescent" slot="start"></ion-spinner>
              }
              {{ isLoginMode() ? 'Sign In' : 'Create Account' }}
            </ion-button>
          </form>

          <!-- Divider -->
          <div class="auth-divider">
            <div class="auth-divider__line"></div>
            <span class="auth-divider__text">or continue with</span>
            <div class="auth-divider__line"></div>
          </div>

          <ion-button expand="block" fill="outline" color="dark" type="button" shape="round"
            class="google-btn">
            <ion-icon slot="start" name="logo-google" class="google-btn__icon"></ion-icon>
            Google
          </ion-button>

        </ion-card-content>
      </ion-card>

      <!-- Footer -->
      <div class="login-footer">
        <p class="login-footer__text">
          By continuing, you agree to Agenda Pro's <a href="#" class="link">Terms of
            Service</a> and <a href="#" class="link">Privacy Policy</a>.
        </p>
      </div>

  </div>

</ion-content>
